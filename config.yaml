baseURL: "https://personal82555.github.io/"
locale: zh-cn
defaultContentLanguage: zh-cn
title: "资享博客 — 软件工具分享"
theme: PaperMod
paginate: 10
enableRobotsTXT: true
enableEmoji: true

languages:
  zh-cn:
    label: "中文"
    weight: 1
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 20
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 30
        - identifier: search
          name: 搜索
          url: /search/
          weight: 40
        - identifier: about
          name: 关于
          url: /about/
          weight: 50

params:
  env: production
  description: "软件工具分享、技术教程、效率工具推荐"
  author: 资享网
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableFingerprinting: true

  label:
    text: "资享博客"
    icon: /images/icon.png
    iconHeight: 35

  homeInfoParams:
    Title: "欢迎来到资享博客"
    Content: "分享实用软件工具、效率技巧和技术教程。每天一篇，帮你提升工作效率。"

  socialIcons:
    - name: github
      url: "https://github.com/personal82555"
    - name: website
      url: "https://www.88531.cn"
    - name: email
      url: "mailto:admin@88531.cn"

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true