name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify --destination public

      - name: Copy to root
        run: |
          # Move built files into a temp dir
          mkdir -p /tmp/gh-pages-build
          cp -r public/* /tmp/gh-pages-build/
          cp public/.nojekyll /tmp/gh-pages-build/ 2>/dev/null || true

      - name: Commit built files to main
        run: |
          rm -rf public
          cp -r /tmp/gh-pages-build/* .
          rm -rf /tmp/gh-pages-build
          git config user.name "Hugo Deploy"
          git config user.email "admin@88531.cn"
          git add -A
          git diff --quiet && git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Deploy $(date '+%Y-%m-%d %H:%M')"
          git push origin main